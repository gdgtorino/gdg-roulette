name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.changes.outputs.frontend }}
      backend: ${{ steps.changes.outputs.backend }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'apps/frontend/**'
              - 'package.json'
              - 'yarn.lock'
            backend:
              - 'apps/backend/**'
              - 'package.json'
              - 'yarn.lock'
            docker:
              - 'apps/**/Dockerfile'
              - 'docker-compose*.yml'
              - '.dockerignore'

  build:
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        app: [frontend, backend]
        exclude:
          - app: frontend
            condition: ${{ needs.changes.outputs.frontend != 'true' }}
          - app: backend
            condition: ${{ needs.changes.outputs.backend != 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            apps/frontend/.next
            apps/backend/dist
            apps/backend/node_modules/.prisma
          key: ${{ runner.os }}-build-${{ matrix.app }}-${{ hashFiles('**/yarn.lock', '**/schema.prisma') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.app }}-${{ hashFiles('**/yarn.lock', '**/schema.prisma') }}-
            ${{ runner.os }}-build-${{ matrix.app }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client (backend only)
        if: matrix.app == 'backend'
        run: |
          cd apps/backend
          yarn prisma generate

      - name: Lint ${{ matrix.app }}
        run: yarn workspace @the-draw/${{ matrix.app }} lint

      - name: Type check and build ${{ matrix.app }}
        run: yarn workspace @the-draw/${{ matrix.app }} build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://placeholder:placeholder@placeholder:5432/placeholder

      - name: Check build size (frontend only)
        if: matrix.app == 'frontend'
        run: |
          cd apps/frontend
          echo "Build size analysis:"
          du -sh .next/
          find .next/static -name "*.js" -type f -exec ls -lah {} \; | head -10

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}-${{ github.sha }}
          path: |
            apps/${{ matrix.app }}/dist
            apps/${{ matrix.app }}/.next
            apps/${{ matrix.app }}/package.json
          retention-days: 7
          compression-level: 6

  docker-build:
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && needs.changes.outputs.docker == 'true'
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        app: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.app }}
          key: ${{ runner.os }}-buildx-${{ matrix.app }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.app }}-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.app }}
          push: false
          tags: |
            the-draw-${{ matrix.app }}:${{ github.sha }}
            the-draw-${{ matrix.app }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.app }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.app }}-new,mode=max
          platforms: linux/amd64
          build-args: |
            NODE_ENV=production
            BUILDKIT_INLINE_CACHE=1

      - name: Test Docker image
        run: |
          # Quick smoke test for the built image
          docker run --rm -d --name test-${{ matrix.app }} the-draw-${{ matrix.app }}:${{ github.sha }}
          sleep 5
          if [ "${{ matrix.app }}" = "frontend" ]; then
            docker exec test-${{ matrix.app }} sh -c "ls -la .next/standalone"
          else
            docker exec test-${{ matrix.app }} sh -c "ls -la dist/"
          fi
          docker stop test-${{ matrix.app }}

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.app }}
          mv /tmp/.buildx-cache-${{ matrix.app }}-new /tmp/.buildx-cache-${{ matrix.app }}

  build-summary:
    runs-on: ubuntu-latest
    needs: [changes, build, docker-build]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Changes Detected |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build.result }} | ${{ needs.changes.outputs.frontend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.build.result }} | ${{ needs.changes.outputs.backend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker-build.result }} | ${{ needs.changes.outputs.docker }} |" >> $GITHUB_STEP_SUMMARY