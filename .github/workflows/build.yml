name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            .next
            dist
            node_modules/.prisma
          key: ${{ runner.os }}-build-${{ hashFiles('**/yarn.lock', '**/schema.prisma') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ hashFiles('**/yarn.lock', '**/schema.prisma') }}-
            ${{ runner.os }}-build-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: yarn db:generate

      - name: Lint
        run: yarn lint

      - name: Type check and build
        run: yarn build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://placeholder:placeholder@placeholder:5432/placeholder

      - name: Check build size
        run: |
          echo "Build size analysis:"
          du -sh .next/
          find .next/static -name "*.js" -type f -exec ls -lah {} \; | head -10

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            .next
            dist
            package.json
          retention-days: 7
          compression-level: 6

  build-summary:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Next.js App | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY